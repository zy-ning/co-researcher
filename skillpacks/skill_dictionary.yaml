      - skill: autoresearchclaw/claim-verification
        strength: medium
      - skill: scientific-agent-skills/scientific-critical-thinking
        strength: strong
      - skill: scientific-agent-skills/scholar-evaluation
        strength: medium
      - skill: claude-tricks/debug
